<script type="text/javascript">
  (function(c,l,a,r,i,t,y){
    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
  })(window, document, "clarity", "script", "xe17nzw0s7");

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;overscroll-behavior:none;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;
  font-family:'Fredoka','Baloo 2',sans-serif;color:#5a2e55;background:#fff}

/* the paper */
#paintCanvas{position:fixed;inset:0;z-index:1;display:block;
  background:linear-gradient(160deg,#fffdf9 0%,#fff6fb 55%,#f7f0ff 100%)}

/* top-left back button (only chrome at the top тАФ keeps the canvas clean) */
.back-link{position:fixed;top:calc(env(safe-area-inset-top,0) + 10px);left:10px;z-index:20;
  display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.8);
  border:1.5px solid rgba(255,20,147,.2);border-radius:24px;padding:8px 15px;text-decoration:none;
  color:#c2408e;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:14px;box-shadow:0 3px 10px rgba(255,20,147,.15)}
.back-link:active{transform:scale(.95)}

/* toolbar pinned to the bottom */
#bar{position:fixed;left:0;right:0;bottom:0;z-index:20;
  padding:8px 8px calc(env(safe-area-inset-bottom,0) + 8px);
  display:flex;flex-direction:column;align-items:center;gap:7px;pointer-events:none}
.bar-row{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;pointer-events:auto;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:2px solid rgba(255,105,180,.35);border-radius:22px;padding:7px 9px;box-shadow:0 6px 22px rgba(255,20,147,.2);max-width:100%}

.swatch{width:34px;height:34px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.18);cursor:pointer;transition:transform .12s ease;flex:0 0 auto}
.swatch.sel{border-color:#333;transform:scale(1.18)}
.swatch:active{transform:scale(.9)}

.tool{width:46px;height:46px;border-radius:16px;border:3px solid #ffe0f0;background:#fff;cursor:pointer;
  font-size:24px;line-height:1;display:flex;align-items:center;justify-content:center;transition:transform .12s ease;flex:0 0 auto}
.tool.sel{border-color:#ff1493;background:#fff0f8;transform:scale(1.06)}
.tool:active{transform:scale(.9)}

.size-dot{display:flex;align-items:center;justify-content:center}
.size-dot i{display:block;border-radius:50%;background:#9a4dff}

/* stamp picker (only visible when the stamp tool is active) */
#stampRow{display:none}
#stampRow.show{display:flex}

.flash{position:fixed;pointer-events:none;font-size:20px;z-index:30;animation:flashUp .7s ease-out forwards}
@keyframes flashUp{0%{transform:translate(-50%,-50%) scale(.5);opacity:1}100%{transform:translate(-50%,-140%) scale(1.2);opacity:0}}
</style>
</head>
<body>
<canvas id="paintCanvas"></canvas>

<a class="back-link" href="play-hub.html">тЖР Back</a>

<div id="bar">
  <div class="bar-row" id="stampRow">
    <!-- stamp emojis injected here -->
  </div>
  <div class="bar-row" id="colorRow">
    <!-- color swatches injected here -->
  </div>
  <div class="bar-row" id="toolRow">
    <button class="tool sel" id="tBrush"  type="button" title="Brush">ЁЯЦМя╕П</button>
    <button class="tool"     id="tRainbow" type="button" title="Rainbow">ЁЯМИ</button>
    <button class="tool"     id="tStamp"  type="button" title="Stamps">тнР</button>
    <button class="tool"     id="tEraser" type="button" title="Eraser">ЁЯз╜</button>
    <button class="tool size-dot" id="tSize" type="button" title="Brush size"><i style="width:16px;height:16px"></i></button>
    <button class="tool"     id="tUndo"   type="button" title="Undo">тЖйя╕П</button>
    <button class="tool"     id="tClear"  type="button" title="Start over">ЁЯЧСя╕П</button>
    <button class="tool"     id="tSave"   type="button" title="Save" style="border-color:#ff1493;background:linear-gradient(135deg,#ff8ec4,#ff1493)">ЁЯТ╛</button>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('paintCanvas');
  const ctx = canvas.getContext('2d');

  // Resizing a canvas clears it тАФ preserve the artwork across resizes
  // (e.g. rotating the device or the browser bars showing/hiding).
  function resize(){
    const w = innerWidth, h = innerHeight;
    if (canvas.width === w && canvas.height === h) return;
    let snap = null;
    try { if (canvas.width && canvas.height) snap = ctx.getImageData(0,0,canvas.width,canvas.height); } catch(e){}
    canvas.width = w; canvas.height = h;
    if (snap){ try{ ctx.putImageData(snap,0,0); }catch(e){} }
  }
  addEventListener('resize', resize); resize();

  const SIZES = [8, 16, 28];
  const state = { tool:'brush', color:'#ff1493', size:16, sizeIdx:1, hue:0, drawing:false, lastX:0, lastY:0, stamp:'тнР' };

  // тФАтФА undo history тФАтФА
  const undo = [];
  function pushUndo(){
    try{ undo.push(ctx.getImageData(0,0,canvas.width,canvas.height)); }catch(e){}
    if (undo.length > 18) undo.shift();
  }

  // тФАтФА drawing тФАтФА
  function lineTo(x, y){
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.lineWidth = state.size;
    if (state.tool === 'eraser'){
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)';
    } else {
      ctx.globalCompositeOperation = 'source-over';
      if (state.tool === 'rainbow'){ state.hue = (state.hue + 6) % 360; ctx.strokeStyle = 'hsl('+state.hue+',85%,60%)'; }
      else ctx.strokeStyle = state.color;
    }
    ctx.beginPath();
    ctx.moveTo(state.lastX, state.lastY);
    ctx.lineTo(x, y);
    ctx.stroke();
    state.lastX = x; state.lastY = y;
  }

  function placeStamp(x, y){
    ctx.globalCompositeOperation = 'source-over';
    ctx.save();
    ctx.font = (state.size * 2.6) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(state.stamp, x, y);
    ctx.restore();
    sparkle(x, y);
  }

  function pointFromEvent(e){
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  canvas.addEventListener('pointerdown', function(e){
    e.preventDefault();
    const p = pointFromEvent(e);
    pushUndo();
    if (state.tool === 'stamp'){ placeStamp(p.x, p.y); return; }
    state.drawing = true; state.lastX = p.x; state.lastY = p.y;
    lineTo(p.x + 0.01, p.y + 0.01); // a dot on a single tap
  });
  canvas.addEventListener('pointermove', function(e){
    if (!state.drawing) return;
    e.preventDefault();
    // smooth: use coalesced events when available
    const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
    for (const ev of evs){ const p = pointFromEvent(ev); lineTo(p.x, p.y); }
  });
  function endStroke(){ state.drawing = false; ctx.globalCompositeOperation = 'source-over'; }
  canvas.addEventListener('pointerup', endStroke);
  canvas.addEventListener('pointercancel', endStroke);
  canvas.addEventListener('pointerleave', endStroke);

  function sparkle(x, y){
    const el = document.createElement('div'); el.className = 'flash'; el.textContent = 'тЬи';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    document.body.appendChild(el); setTimeout(()=>el.remove(), 700);
  }

  // тФАтФА colors тФАтФА
  const COLORS = ['#ff1493','#ff5ba0','#ff8c42','#ffd23f','#6ddf6d','#3fb6ff','#9a4dff','#8a5a44','#333333','#ffffff'];
  const colorRow = document.getElementById('colorRow');
  COLORS.forEach(function(c, i){
    const s = document.createElement('button'); s.type='button'; s.className='swatch'+(i===0?' sel':'');
    s.style.background = c;
    s.addEventListener('click', function(){
      state.color = c;
      // choosing a color implies you want to draw, not erase/stamp
      if (state.tool === 'eraser' || state.tool === 'stamp' || state.tool === 'rainbow') selectTool('brush');
      Array.from(colorRow.children).forEach(x=>x.classList.remove('sel'));
      s.classList.add('sel');
    });
    colorRow.appendChild(s);
  });

  // тФАтФА stamps тФАтФА
  const STAMPS = ['тнР','ЁЯТЦ','ЁЯжД','ЁЯМИ','ЁЯМ╕','ЁЯжЛ','ЁЯР▒','ЁЯМЩ','ЁЯНн','ЁЯСС'];
  const stampRow = document.getElementById('stampRow');
  STAMPS.forEach(function(em, i){
    const s = document.createElement('button'); s.type='button'; s.className='tool'+(i===0?' sel':'');
    s.textContent = em;
    s.addEventListener('click', function(){
      state.stamp = em;
      Array.from(stampRow.children).forEach(x=>x.classList.remove('sel'));
      s.classList.add('sel');
    });
    stampRow.appendChild(s);
  });

  // тФАтФА tools тФАтФА
  const toolBtns = { brush:'tBrush', rainbow:'tRainbow', stamp:'tStamp', eraser:'tEraser' };
  function selectTool(name){
    state.tool = name;
    Object.entries(toolBtns).forEach(function(pair){
      document.getElementById(pair[1]).classList.toggle('sel', pair[0]===name);
    });
    stampRow.classList.toggle('show', name==='stamp');
  }
  document.getElementById('tBrush').addEventListener('click', ()=>selectTool('brush'));
  document.getElementById('tRainbow').addEventListener('click', ()=>selectTool('rainbow'));
  document.getElementById('tStamp').addEventListener('click', ()=>selectTool('stamp'));
  document.getElementById('tEraser').addEventListener('click', ()=>selectTool('eraser'));

  // brush size cycles small тЖТ medium тЖТ big
  const sizeDot = document.querySelector('#tSize i');
  document.getElementById('tSize').addEventListener('click', function(){
    state.sizeIdx = (state.sizeIdx + 1) % SIZES.length;
    state.size = SIZES[state.sizeIdx];
    const d = 10 + state.sizeIdx*6;
    sizeDot.style.width = d+'px'; sizeDot.style.height = d+'px';
  });

  document.getElementById('tUndo').addEventListener('click', function(){
    if (!undo.length) return;
    const img = undo.pop();
    try{ ctx.putImageData(img, 0, 0); }catch(e){}
  });

  document.getElementById('tClear').addEventListener('click', function(){
    pushUndo();
    ctx.clearRect(0,0,canvas.width,canvas.height);
  });

  // тФАтФА save / share тФАтФА
  document.getElementById('tSave').addEventListener('click', function(){
    const pad = 60;
    const off = document.createElement('canvas');
    off.width = canvas.width; off.height = canvas.height + pad;
    const octx = off.getContext('2d');
    octx.fillStyle = '#fff'; octx.fillRect(0,0,off.width,off.height);
    octx.drawImage(canvas, 0, 0);
    octx.textAlign = 'center';
    octx.fillStyle = '#ff1493'; octx.font = "bold 22px 'Baloo 2', sans-serif";
    octx.fillText('Made with тЬи SparklePop', off.width/2, canvas.height + 26);
    octx.fillStyle = '#9a4dff'; octx.font = "bold 15px 'Baloo 2', sans-serif";
    octx.fillText('sparklespop.com ┬╖ ЁЯУ╖ @sparklespop4', off.width/2, canvas.height + 48);
    const dataUrl = off.toDataURL('image/png');
    fetch(dataUrl).then(r=>r.blob()).then(function(blob){
      const file = new File([blob], 'my-sparklepop-painting.png', { type:'image/png' });
      if (navigator.canShare && navigator.canShare({ files:[file] })){
        navigator.share({ files:[file], title:'My SparklePop Painting', text:'Made with SparklePop! sparklespop.com' }).catch(()=>dl(dataUrl));
      } else dl(dataUrl);
    }).catch(()=>dl(dataUrl));
    function dl(u){ const a=document.createElement('a'); a.href=u; a.download='my-sparklepop-painting.png'; document.body.appendChild(a); a.click(); a.remove(); }
  });
})();
</script>

<!-- тФАтФА 15-minute play reminder (shared across play surfaces) тФАтФА -->
<div id="spTimerOverlay" class="sp-timer-overlay" style="display:none">
  <div class="sp-timer-card">
    <div class="sp-timer-unicorn">ЁЯжД</div>
    <div class="sp-timer-title">10 minutes of magic! тЬи</div>
    <div class="sp-timer-desc">Great painting! Maybe stretch, get some water, or go show mummy what you made.</div>
    <button type="button" class="sp-timer-btn" id="spTimerOkBtn">Okay! ЁЯТЦ</button>
  </div>
</div>
<style>
.sp-timer-overlay{position:fixed;inset:0;z-index:99999;background:rgba(90,20,70,.5);display:flex;align-items:center;justify-content:center;padding:20px;animation:spFadeIn .3s ease}
@keyframes spFadeIn{from{opacity:0}to{opacity:1}}
.sp-timer-card{background:#fff;border-radius:32px;padding:32px 28px;max-width:320px;text-align:center;box-shadow:0 20px 60px rgba(255,20,147,.4);border:5px solid #ffd6ea;font-family:'Fredoka','Baloo 2',sans-serif}
.sp-timer-unicorn{font-size:64px;animation:spBob 1.6s ease-in-out infinite;filter:drop-shadow(0 8px 20px rgba(255,20,147,.4))}
@keyframes spBob{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.sp-timer-title{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:22px;color:#ff1493;margin:10px 0 6px}
.sp-timer-desc{font-size:14px;color:#8a5a80;line-height:1.5;margin-bottom:18px}
.sp-timer-btn{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:16px;background:linear-gradient(135deg,#ff8ec4,#ff1493);color:#fff;border:none;padding:12px 30px;border-radius:999px;cursor:pointer;box-shadow:0 8px 20px rgba(255,20,147,.35)}
</style>
<script>
(function(){
  var DURATION = 10*60*1000, IDLE_RESET = 45*60*1000, KEY = 'sp_session_start';
  var start = parseInt(localStorage.getItem(KEY) || '0', 10), now = Date.now();
  if (!start || (now - start) > IDLE_RESET) { start = now; localStorage.setItem(KEY, String(start)); }
  function chime(){ try{ var a=new (window.AudioContext||window.webkitAudioContext)(); [660,880].forEach(function(f,i){ var o=a.createOscillator(),g=a.createGain(); o.type='sine'; o.frequency.value=f; g.gain.value=0.0001; o.connect(g); g.connect(a.destination); var t=a.currentTime+i*0.18; g.gain.exponentialRampToValueAtTime(0.05,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.3); o.start(t); o.stop(t+0.32); }); }catch(e){} }
  function showReminder(){ var o=document.getElementById('spTimerOverlay'); if(!o) return; o.style.display='flex'; chime(); }
  function scheduleCheck(){ var elapsed=Date.now()-start, remaining=DURATION-(elapsed%DURATION); setTimeout(function(){ showReminder(); start=Date.now(); localStorage.setItem(KEY,String(start)); scheduleCheck(); }, remaining); }
  document.addEventListener('DOMContentLoaded', function(){
    var btn=document.getElementById('spTimerOkBtn');
    if (btn) btn.addEventListener('click', function(){ document.getElementById('spTimerOverlay').style.display='none'; });
    if (Date.now()-start >= DURATION){ showReminder(); start=Date.now(); localStorage.setItem(KEY,String(start)); }
    scheduleCheck();
  });
})();
</script>
</body>
